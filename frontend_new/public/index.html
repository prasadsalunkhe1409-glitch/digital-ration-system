<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />

    <!-- Viewport for mobile responsiveness -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>Digital Ration Distribution System | Maharashtra PDS Portal</title>

    <meta
      name="description"
      content="Digital Ration Distribution System for Maharashtra Public Distribution Portal. Secure MERN stack web application for Admin, Dealer and Villager ration management, stock tracking and ration distribution."
    />

    <meta
      name="keywords"
      content="Digital Ration System, Maharashtra PDS, Public Distribution System, Ration Card Management, MERN Stack Project, Ration Distribution Portal"
    />

    <meta name="author" content="Prasad Salunkhe" />

    <!-- Allow search engine indexing -->
    <meta name="robots" content="index, follow" />

    <!-- Canonical URL (UPDATE after deployment) -->
    <link rel="canonical" href="https://digitalration.netlify.app/" />

    <!-- Open Graph for social sharing -->
    <meta
      property="og:title"
      content="Digital Ration Distribution System Maharashtra"
    />
    <meta
      property="og:description"
      content="Secure online Public Distribution System built using MERN stack for ration management."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://digitalration.netlify.app/" />

    <!-- Theme color -->
    <meta name="theme-color" content="#0f172a" />

    <!-- Favicon -->
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />

    <!-- Manifest file -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
  </head>

  <body>
    <noscript> You need to enable JavaScript to run this app. </noscript>

    <!-- React root -->
    <div id="root"></div>
  </body>
</html>
